<svg xmlns="http://www.w3.org/2000/svg" width="900" height="482" viewBox="0 0 900 482">
  <rect width="900" height="482" fill="#0d1117"/>
  <!-- terminal window -->
  <rect x="14" y="14" width="872" height="454" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- title bar -->
  <rect x="15" y="15" width="870" height="30" rx="7" fill="#21262d"/>
  <rect x="15" y="34" width="870" height="11" fill="#21262d"/>
  <circle cx="36" cy="30" r="5.5" fill="#ff5f57"/>
  <circle cx="53" cy="30" r="5.5" fill="#ffbd2e"/>
  <circle cx="70" cy="30" r="5.5" fill="#28c840"/>
  <text x="450" y="35" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="11.5" fill="#8b949e" text-anchor="middle">claude-as list</text>

  <!-- CLAUDE AS ACCOUNTS (cyan accent) -->
  <text x="28" y="72" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#22d3ee">CLAUDE AS ACCOUNTS</text>

  <!-- accounts 2  active 1  claude patched -->
  <text x="28" y="91" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">accounts </text>
  <text x="112" y="91" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">2</text>
  <text x="121" y="91" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">  active </text>
  <text x="196" y="91" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">1</text>

  <text x="28" y="110" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">claude </text>
  <text x="96" y="110" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">patched</text>

  <!-- account1: active + patched -->
  <text x="28" y="148" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">* active + patched you@example.com</text>

  <text x="28" y="167" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Email   </text>
  <text x="112" y="167" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">you@example.com</text>

  <text x="28" y="186" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Updated </text>
  <text x="112" y="186" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">Mar 16, 2026, 10:00 AM</text>

  <!-- 5h bar: 80% warn/yellow -->
  <text x="28" y="205" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#facc15">  5h   [########..] 80% </text>
  <text x="265" y="205" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">reset Mar 16, 2026, 08:00 PM</text>

  <!-- 7d bar: 20% good/green -->
  <text x="28" y="224" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">  7d   [##........] 20% </text>
  <text x="265" y="224" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">reset Mar 23, 2026, 03:00 PM</text>

  <text x="28" y="243" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Status  </text>
  <text x="122" y="243" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">usage loaded</text>

  <text x="28" y="262" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Claude  </text>
  <text x="112" y="262" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">patched</text>

  <!-- account2: saved (inactive) -->
  <text x="28" y="300" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">- saved  </text>
  <text x="112" y="300" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#22d3ee">work@example.com</text>

  <text x="28" y="319" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Email   </text>
  <text x="112" y="319" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">work@example.com</text>

  <text x="28" y="338" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Updated </text>
  <text x="112" y="338" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">Mar 16, 2026, 08:00 AM</text>

  <!-- 5h bar: 0% good/green fresh -->
  <text x="28" y="357" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">  5h   [..........]  0% </text>
  <text x="265" y="357" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">reset Mar 16, 2026, 06:00 PM</text>

  <!-- 7d bar: 55% good/green available -->
  <text x="28" y="376" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">  7d   [######....] 55% </text>
  <text x="265" y="376" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">reset Mar 23, 2026, 12:00 PM</text>

  <text x="28" y="395" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">  Status  </text>
  <text x="122" y="395" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4ade80">usage loaded</text>

  <!-- prompt -->
  <text x="28" y="452" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#4b5563">$ </text>
  <text x="44" y="452" font-family="'JetBrains Mono',Menlo,Monaco,monospace" font-size="13.5" fill="#e2e8f0">claude-as list</text>
  <rect x="184" y="439" width="8" height="14" fill="#4ade80" opacity="0.6"/>
</svg>
